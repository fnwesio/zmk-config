# --- DISPLAY SETTINGS ---
# Enables the OLED Display
CONFIG_ZMK_DISPLAY=y
# Set brightness to 30% (30% of 255 is approx 77)
CONFIG_ZMK_DISPLAY_CONTRAST=77

# --- STABILITY & PERFORMANCE ---
# Enable ZMK Studio for real-time keymap changes
CONFIG_ZMK_STUDIO=y

# Haimu Switch Stability (Prevents double-typing/chatter)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=8
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=8

# Boost Bluetooth signal strength
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- POWER MANAGEMENT ---
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

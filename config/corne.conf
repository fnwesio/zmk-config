# --- DISPLAY SETTINGS ---
CONFIG_ZMK_DISPLAY=y

# --- STABILITY & STUDIO ---
CONFIG_ZMK_STUDIO=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- POWER MANAGEMENT ---
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# --- DEBOUNCE ---
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=8
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=8

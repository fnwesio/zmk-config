# --- DISPLAY SETTINGS ---
# Enables the OLED Display
CONFIG_ZMK_DISPLAY=y
# Sets brightness to 30% (Approx 77 out of 255)
CONFIG_ZMK_DISPLAY_CONTRAST=77

# --- TYPING & TIMING ---
# Sets your layer-tap hold/tap window to 170ms globally
CONFIG_ZMK_TYPING_TERM_MS=170
# Prevents "ghost" taps on Haimu Heartbeat switches
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=8
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=8

# --- STABILITY & STUDIO ---
# Enable ZMK Studio for real-time changes
CONFIG_ZMK_STUDIO=y
# Boost Bluetooth signal for CachyOS/Linux stability
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- POWER MANAGEMENT ---
# Deep sleep after 30 minutes of inactivity
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
